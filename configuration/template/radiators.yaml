- switch:
    - name: Adams Radiator
      unique_id: bdfedd86-bc8f-4052-8407-ceea29ec17a0
      state: "{{ state_attr('climate.adams_radiator_becathermostat','temperature')|float >10 }}"
      turn_on:
        - action: climate.set_temperature
          data:
            temperature: 24
          target:
            entity_id: climate.adams_radiator_becathermostat
      turn_off:
        - action: climate.set_temperature
          data:
            temperature: 5
          target:
            entity_id: climate.adams_radiator_becathermostat
      icon: >-
        {% if state_attr('climate.adams_radiator_becathermostat','temperature')|float >10 %}
          mdi:radiator
        {% else %}
          mdi:radiator-off
        {% endif %}

